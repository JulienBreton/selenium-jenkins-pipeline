<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERREUR Systéme - Test Selenium</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Rouge pour l'erreur */
            background-color: #fce4e4; 
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            /* Bordure rouge */
            border: 2px solid #e74c3c; 
        }
        #status-message {
            /* Texte rouge */
            color: #e74c3c; 
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>❌ ÉTAT DU SYSTÈME ❌</h1>
        <p id="status-message">la plateforme est KO</p>
        <p>Motif : Maintenance planifiée.</p>
        <p>Dernière vérification : <span id="time"></span></p>
    </div>

    <script>
        document.getElementById('time').innerText = new Date().toLocaleString();
    </script>
</body>
</html>
