<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ptf Control - Jenkins</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 2rem; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        #status-message { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        .is-ok { background-color: #e8f5e9; color: #2e7d32; }
        .is-ko { background-color: #ffebee; color: #c62828; }
    </style>
</head>
<body id="bg">
    <div class="container">
        <h1>État Système</h1>
        <p id="status-message">Vérification...</p>
        <p style="font-size: 11px;">(Ajoutez ?status=ko à l'URL pour tester)</p>
    </div>

    <script>
        const msg = document.getElementById('status-message');
        const bg = document.getElementById('bg');

        function updateDisplay() {
            // On récupère le paramètre "status" dans l'URL
            const urlParams = new URLSearchParams(window.location.search);
            const statusParam = urlParams.get('status');

            if (statusParam === "ko") {
                msg.innerText = "la plateforme est KO";
                bg.className = "is-ko";
            } else {
                msg.innerText = "la plateforme est ok";
                bg.className = "is-ok";
            }
        }

        window.onload = updateDisplay;
    </script>
</body>
</html>
