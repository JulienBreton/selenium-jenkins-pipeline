<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statut Plateforme - Test Selenium</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        #status-message {
            color: #2ecc71;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>État du système</h1>
        <p id="status-message">la plateforme est ok</p>
        <p>Dernière vérification : <span id="time"></span></p>
    </div>

    <script>
        // Un petit script pour montrer que la page est "vivante"
        document.getElementById('time').innerText = new Date().toLocaleString();
    </script>
</body>
</html>
